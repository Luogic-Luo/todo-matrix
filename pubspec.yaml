name: todo_app
description: A modern todo app with inbox, calendar, and Eisenhower Matrix.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0
  flutter: ^3.27.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.1
  sqflite: ^2.4.0
  path: ^1.9.0
  table_calendar: ^3.1.3
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  uuid: ^4.5.1
  intl: ^0.19.0
  google_fonts: ^6.3.0
  flutter_animate: ^4.5.2
  gap: ^3.0.1
  sqflite_common_ffi: ^2.3.4+4
  sqlite3_flutter_libs: ^0.5.30
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.5.0
  build_runner: ^2.4.8
  freezed: ^2.5.2
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
